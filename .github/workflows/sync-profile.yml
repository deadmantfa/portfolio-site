name: Sync GitHub Profile

on:
  push:
    branches:
      - main
    paths:
      - 'src/data/**'
      - 'scripts/sync-github-profile.ts'
      - 'src/utils/github-sync-utils.ts'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Portfolio Repo
        uses: actions/checkout@v4
        with:
          path: portfolio

      - name: Checkout Profile Repo
        uses: actions/checkout@v4
        with:
          repository: deadmantfa/deadmantfa
          token: ${{ secrets.PROFILE_SYNC_TOKEN }}
          path: profile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portfolio/package.json

      - name: Install Dependencies
        run: cd portfolio && npm install

      - name: Generate README
        run: |
          cd portfolio
          npx tsx scripts/sync-github-profile.ts ../profile/README.md

      - name: Commit and Push Changes
        run: |
          cd profile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to README.md"
          else
            git commit -m "docs: Automated sync from portfolio-site [$(date +%F)]"
            git push
          fi
